<header>
    <div class="logo">
        <!-- <img [src]="img" alt="Logo"> -->
        <span class="pre">&lt; THE </span><span class="deux">CODE/</span><span style="color:rgb(3, 179, 3);">&gt;</span>
    </div>
    <button type="button" class="burger" (click)="showMenu = !showMenu" aria-label="Toggle navigation" [attr.aria-expanded]="showMenu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav [class.open]="showMenu">
        <ul>
            @for(i of tab;track i){
                <li><a href="#{{i}}">{{i}}</a></li>
            }
        </ul>
    </nav>
</header>
