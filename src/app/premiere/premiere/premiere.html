<header class="bg-white shadow-sm border-b border-gray-100 sticky top-0 z-50">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="h-16 sm:h-20 flex items-center justify-between">

      <!-- Logo -->
      <h1 class="text-lg sm:text-xl lg:text-2xl font-bold uppercase whitespace-nowrap">
        <span class="text-yellow-500">Boutique</span> des Fleurs
      </h1>

      <!-- Barre de recherche -->
      <div class="hidden md:flex flex-1 max-w-md mx-6">
        <div class="relative w-full">

          <fa-icon
            [icon]="iconSearch"
            class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
          </fa-icon>

          <input
            type="search"
            placeholder="Rechercher..."
            class="w-full pl-11 pr-4 py-2 border rounded-full focus:ring-2 focus:ring-yellow-500 outline-none">

        </div>
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-2 sm:gap-4">

        <!-- Contact -->
        <a
          href="#contact"
          class="hidden lg:block text-sm font-medium text-gray-600 hover:text-green-600">
          Contact
        </a>

        <!-- Panier -->
        <button
          (click)="panierService.validerCommandeWhatsApp()"
          class="flex items-center gap-2 border rounded-full px-3 py-2 hover:bg-gray-50">

          <fa-icon [icon]="iconCart"></fa-icon>

          <span class="hidden sm:inline">
            Panier
          </span>

          <span
            class="bg-pink-100 text-pink-700 text-xs px-2 py-0.5 rounded-full font-bold">
            {{ panierService.getNombreArticles() }}
          </span>

        </button>

        <!-- Recherche mobile -->
        <button class="md:hidden p-2 rounded-full hover:bg-gray-100">
          <fa-icon [icon]="iconSearch"></fa-icon>
        </button>

        <!-- Connexion -->
        <button
          class="hidden sm:block text-sm text-gray-600 hover:text-green-600">
          Se connecter
        </button>

        <!-- Inscription -->
        <button
          class="hidden md:block bg-yellow-500 hover:bg-green-700 text-white px-4 py-2 rounded-full text-sm">
          S'inscrire
        </button>

      </div>

    </div>

  </div>

</header>
