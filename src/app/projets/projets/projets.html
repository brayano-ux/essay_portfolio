<h1>Liste des Produits</h1>

@if (connect) {
  <ul>
    @for (p of listeDeProduits; track p) {
      <li>
        {{ p.name }} - {{ p.quantite }} pcs - {{ p.prix }} F
      </li>
    }
  </ul>
} @else {
  <p class="text-red-600">Veuillez vous connecter pour voir les produits.</p>
}

<button 
  (click)="estconnecter()" 
  [ngClass]="connect ? 'bg-green-600' : 'bg-red-600'"
  class="text-white p-2 rounded transition-colors">
  {{ connect ? 'Se déconnecter' : 'Se connecter' }}
</button>
